services:
  app:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bagradar
      POSTGRES_PASSWORD: bagradar
      POSTGRES_DB: bagradar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bagradar"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
